<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rive Study – Orange Walk Cycle</title>

    <script src="https://unpkg.com/@rive-app/webgl2@latest"></script>

    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #161616;
        overflow: hidden;
      }

      .stage {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      canvas {
        border: 1px solid #444;
        display: block;
        height: 82vh; 
        width: auto;
        aspect-ratio: 9 / 16;
        max-width: 95vw;
      }

      /* Minimalist Button Style */
      .nav-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 6px 10px;
        background-color: #161616;
        color: #EEEEEE;
        border: 1px solid #EEEEEE;
        border-radius: 4px;
        text-decoration: none;
        font-size: 18px;
        transition: background-color 0.2s ease;
        cursor: pointer;
      }

      .nav-btn:hover {
        background-color: #2B2B2B;
      }
    </style>
  </head>
  <body>

    <div class="stage">
      <canvas id="riveCanvas" width="1080" height="1920"></canvas>

      <a href="grape.html" class="nav-btn">
        <span>←</span> 🍇
      </a>
    </div>

    <script src="orange.js"></script>

  </body>
</html>
